version: '3.8'

services:
  # Main Application
  radar-app:
    build: .
    ports:
      - "7860:7860"
    volumes:
      - .:/app
    environment:
      # Point to the ollama service by its Docker service name, not localhost
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2
    depends_on:
      - ollama

  # Ollama Engine
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama   # persist pulled models across restarts

volumes:
  ollama_data:
